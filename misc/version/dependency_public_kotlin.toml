# 版本号
[versions]
# ----- 核心组件 -----
kotlin = "2.2.20"
ktx_coroutines = "1.11.0"
ktx_serial-json = "1.11.0"


# ----- 数据存储 -----
sqldelight = "2.3.2"


# ----- 网络通讯 -----
ktor = "3.5.0"


# ----- 图形界面 -----
compose-material3 = "1.9.0"
compose-materialIcons = "1.7.3"
compose-resources = "1.11.1"

reorderable = "2.4.3"
coil3 = "3.5.0"
filekit = "0.14.2"


# ----- 测试工具 -----
mockito-kotlin = "5.4.0"
mockk = "1.13.17"


# ----- Gradle插件 -----
plugin_ksp = "2.2.20-2.0.4"
# Compose Desktop（与 Kotlin 2.2.20 匹配）
plugin_compose = "1.11.1"
plugin_dokka = "2.2.0"
plugin_kover = "0.9.8"
buildConfig = "6.0.10"


# 组件
[libraries]
# ----- 核心组件 -----
# < Kotlin 官方组件 >
# Kotlin・标准库
standardlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlin" }
# Kotlin・反射
reflect = { group = "org.jetbrains.kotlin", name = "kotlin-reflect", version.ref = "kotlin" }
# Kotlin・测试工具
test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }

# < Kotlin 官方扩展 >
# Kotlin・协程・核心
ktx_coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "ktx_coroutines" }
# Kotlin・协程・Java Swing支持（允许在Java GUI中使用Main调度器）
ktx_coroutines-swing = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-swing", version.ref = "ktx_coroutines" }
# Kotlin・协程・测试工具
ktx_coroutines-test = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test", version.ref = "ktx_coroutines" }
# Kotlin・序列化・JSON
ktx_serial-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "ktx_serial-json" }


# ----- 数据存储 -----
# < SQLDelight >
# SQLDelight・核心
sqldelight-runtime = { module = "app.cash.sqldelight:runtime", version.ref = "sqldelight" }
# SQLDelight・驱动・SQLite
sqldelight-driver-sqlite = { module = "app.cash.sqldelight:sqlite-driver", version.ref = "sqldelight" }
# SQLDelight・协程扩展（查询方法可以返回Flow类型）
sqldelight-coroutines = { module = "app.cash.sqldelight:coroutines-extensions", version.ref = "sqldelight" }


# ----- 网络通讯 -----
# < Ktor >
ktor-client-core = { module = "io.ktor:ktor-client-core", version.ref = "ktor" }
ktor-client-cio = { module = "io.ktor:ktor-client-cio", version.ref = "ktor" }
ktor-client-content-negotiation = { module = "io.ktor:ktor-client-content-negotiation", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }
ktor-client-logging = { module = "io.ktor:ktor-client-logging", version.ref = "ktor" }


# ----- 图形界面 -----
# < Compose Multiplatform >
# Compose・Material3
compose-material3 = { module = "org.jetbrains.compose.material3:material3", version.ref = "compose-material3" }
# Compose・内置图标资源
compose-materialIcons = { module = "org.jetbrains.compose.material:material-icons-extended", version.ref = "compose-materialIcons" }
# Compose・资源框架
compose-resources = { module = "org.jetbrains.compose.components:components-resources", version.ref = "compose-resources" }

# < Reorderable >
reorderable = { module = "sh.calvin.reorderable:reorderable", version.ref = "reorderable" }
# < Coil3 >
# Coil3・Compose支持
coil3-compose = { module = "io.coil-kt.coil3:coil-compose", version.ref = "coil3" }
# < FileKit >
# FileKit・核心
filekit-core = { module = "io.github.vinceglb:filekit-core", version.ref = "filekit" }
# FileKit・对话框
filekit-dialogs = { module = "io.github.vinceglb:filekit-dialogs", version.ref = "filekit" }
# FileKit・对话框・Compose扩展
filekit-dialogs-compose = { module = "io.github.vinceglb:filekit-dialogs-compose", version.ref = "filekit" }


# ----- 测试工具 -----
# < Mockito >
# Mockito・Kotlin扩展
mockito-kotlin = { group = "org.mockito.kotlin", name = "mockito-kotlin", version.ref = "mockito-kotlin" }

# < MockK >
# 核心
mockk = { group = "io.mockk", name = "mockk", version.ref = "mockk" }


# Gradle插件
[plugins]
# ----- Kotlin -----
# 基础・JVM平台支持
core = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
# 扩展・序列化
serial = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
# 扩展・Spring支持
spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
# KSP（注解处理器）
ksp = { id = "com.google.devtools.ksp", version.ref = "plugin_ksp" }


# ----- Compose Multiplatform -----
# Compose Multiplatform
compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "plugin_compose" }
# Compose Multiplatform 编译器（仅基于Kotlin v2.0之后的Compose Multiplatform版本需要声明）
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
# Kotlin Multiplatform
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }


# ----- 其他插件 -----
# SQLDelight
sqldelight = { id = "app.cash.sqldelight", version.ref = "sqldelight" }
# Dokka（文档生成工具）
dokka = { id = "org.jetbrains.dokka", version.ref = "plugin_dokka" }
# Kover（测试代码覆盖率检测工具）
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "plugin_kover" }
# BuildConfig生成插件（类似Android的BuildConfig类生成工具，以便我们通过构建脚本向应用程序注入版本号等信息。）
buildConfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildConfig" }
